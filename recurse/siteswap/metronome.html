<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integer Pitch Sequencer</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        input[type="text"], input[type="range"] { width: 100%; box-sizing: border-box; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1.1rem; letter-spacing: 2px; }
        .controls { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: opacity 0.2s; }
        .btn-gen { background: #007bff; color: white; }
        .btn-play { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Audio Sequencer</h2>
    
    <div class="group">
        <label for="sequence">Integer Sequence</label>
        <input type="text" id="sequence" placeholder="e.g. 441333441" value="441333441">
    </div>

    <div class="group">
        <label for="bpm">BPM: <span id="bpmVal">218</span></label>
        <input type="range" id="bpm" min="60" max="300" value="120">
    </div>

    <div class="controls">
        <button class="btn-play" onclick="startSequencer()">Play</button>
        <button class="btn-stop" onclick="stopSequencer()">Stop</button>
    </div>
    
    <div id="status" class="status">Ready</div>
</div>

<script>
let audioCtx = null;
    let nextNoteTime = 0;
    let currentStep = 0;
    let timerId = null;
    let sequence = [];
    let panDirection = -1; // -1 is Left, 1 is Right

    const bpmInput = document.getElementById('bpm');
    const bpmDisplay = document.getElementById('bpmVal');
    const sequenceInput = document.getElementById('sequence');
    const statusDisplay = document.getElementById('status');

    bpmInput.oninput = () => bpmDisplay.innerText = bpmInput.value;

    function playTick(pitchValue, time, panValue) {
        if (!audioCtx) return;
        
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();

        // Frequency logic
        const freq = 220 + (pitchValue * 110);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, time);

        // Set the Pan (Left or Right)
        panner.pan.setValueAtTime(panValue, time);

        // Tick envelope
        envelope.gain.setValueAtTime(0, time);
        envelope.gain.linearRampToValueAtTime(0.3, time + 0.01);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

        // Routing: Oscillator -> Panner -> Envelope -> Destination
        osc.connect(panner);
        panner.connect(envelope);
        envelope.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.1);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            const pitch = parseInt(sequence[currentStep]);
            if (!isNaN(pitch)) {
                // Play the tick with the current pan direction
                playTick(pitch, nextNoteTime, panDirection);
                
                // Flip the direction for the next tick: -1 becomes 1, 1 becomes -1
                panDirection *= -1;
            }
            
            const secondsPerBeat = 60.0 / bpmInput.value;
            nextNoteTime += secondsPerBeat;

            currentStep++;
            if (currentStep >= sequence.length) {
                currentStep = 0;
            }
        }
        timerId = setTimeout(scheduler, 25);
    }

    function startSequencer() {
        if (timerId) return;
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        sequence = sequenceInput.value.split('');
        if (sequence.length === 0) return;

        currentStep = 0;
        panDirection = -1; // Reset to start on the left speaker
        nextNoteTime = audioCtx.currentTime + 0.05;
        statusDisplay.innerText = "Playing (Alternating Stereo)...";
        scheduler();
    }

    function stopSequencer() {
        clearTimeout(timerId);
        timerId = null;
        statusDisplay.innerText = "Stopped";
    }</script>

</body>
</html>
