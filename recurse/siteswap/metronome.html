<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stereo Integer Sequencer</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #121212; 
            color: white;
            overflow: hidden;
        }
        
        /* Updated Styles for a sharper flash */
        #visualizer {
            font-size: 15rem;
            font-weight: 800;
            margin-bottom: 2rem;
            height: 18rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* This animation runs once every time the class is added */
        .pulse {
            animation: flash-animation 0.1s ease-out;
        }

        @keyframes flash-animation {
            0% { transform: scale(1); color: #00d4ff; }
            50% { transform: scale(1.15); color: #ffffff; text-shadow: 0 0 40px #fff; }
            100% { transform: scale(1); color: #00d4ff; }
        }
        .card { 
            background: #1e1e1e; 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 350px; 
            z-index: 10;
        }
        
        .group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        
        input[type="text"] { 
            width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; 
            background: #252525; color: white; font-size: 1.2rem; text-align: center;
        }

        input[type="range"] { width: 100%; accent-color: #00d4ff; }

        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button { 
            flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 4px; 
            font-weight: bold; font-size: 1rem;
        }
        .btn-play { background: #00d4ff; color: #000; }
        .btn-stop { background: #333; color: #fff; }
        .status { margin-top: 10px; font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div id="visualizer">-</div>

    <div class="card">
        <div class="group">
            <label>Sequence</label>
            <input type="text" id="sequence" value="441333441">
        </div>

        <div class="group">
            <label>BPM: <span id="bpmVal">120</span></label>
            <input type="range" id="bpm" min="60" max="300" value="120">
        </div>

        <div class="controls">
            <button class="btn-play" onclick="startSequencer()">PLAY</button>
            <button class="btn-stop" onclick="stopSequencer()">STOP</button>
        </div>
        <div id="status" class="status">Ready</div>
    </div>

<script>
    let audioCtx = null;
    let nextNoteTime = 0;
    let currentStep = 0;
    let timerId = null;
    let sequence = [];
    let panDirection = -1;

    const visualizer = document.getElementById('visualizer');
    const bpmInput = document.getElementById('bpm');
    const bpmDisplay = document.getElementById('bpmVal');
    const sequenceInput = document.getElementById('sequence');
    const statusDisplay = document.getElementById('status');

    bpmInput.oninput = () => bpmDisplay.innerText = bpmInput.value;

    function updateVisuals(digit, time) {
        const delay = (time - audioCtx.currentTime) * 1000;
        
        // Schedule the visual update
        setTimeout(() => {
            // 1. Force reset: remove class and clear text for a tiny fraction of time
            visualizer.classList.remove('pulse');
            visualizer.innerText = ''; 
            
            // 2. Use requestAnimationFrame to ensure the "reset" is rendered by the browser
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    visualizer.innerText = digit;
                    visualizer.classList.add('pulse');
                    
                    // Visual pan update
                    visualizer.style.transform = `translateX(${panDirection * -30}px)`;
                });
            });
        }, delay);
    }
    function playTick(pitchValue, time, panValue) {
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();

        const freq = 220 + (pitchValue * 110);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, time);
        panner.pan.setValueAtTime(panValue, time);

        envelope.gain.setValueAtTime(0, time);
        envelope.gain.linearRampToValueAtTime(0.4, time + 0.005);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

        osc.connect(panner);
        panner.connect(envelope);
        envelope.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.1);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            const digit = sequence[currentStep];
            const pitch = parseInt(digit);
            
            if (!isNaN(pitch)) {
                playTick(pitch, nextNoteTime, panDirection);
                updateVisuals(digit, nextNoteTime);
                panDirection *= -1;
            }
            
            nextNoteTime += 60.0 / bpmInput.value;
            currentStep = (currentStep + 1) % sequence.length;
        }
        timerId = setTimeout(scheduler, 25);
    }

    function startSequencer() {
        if (timerId) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        sequence = sequenceInput.value.replace(/\s/g, '').split('');
        if (sequence.length === 0) return;

        currentStep = 0;
        panDirection = -1;
        nextNoteTime = audioCtx.currentTime + 0.05;
        statusDisplay.innerText = "Running...";
        scheduler();
    }

    function stopSequencer() {
        clearTimeout(timerId);
        timerId = null;
        visualizer.innerText = "-";
        visualizer.classList.remove('pulse');
        statusDisplay.innerText = "Stopped";
    }
</script>
</body>
</html>
