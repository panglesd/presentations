<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Siteswap Simulator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: #eee; }
        
        canvas { background: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-radius: 4px; margin-top: 20px; }
        
        /* The Siteswap Display Strip */
        #patternDisplay {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            padding: 10px 20px;
            min-height: 70px;
            align-items: center;
            justify-content: center;
        }
        
        .throw-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: #888;
            padding: 10px 15px;
            border-radius: 8px;
            background: #444;
            transition: all 0.2s;
            position: relative;
            min-width: 20px;
            text-align: center;
        }

        /* Hand Differentiation Styles */
        .throw-val.hand-right {
            transform: translateY(15px);
            border-bottom: 3px solid #555;
        }
        
        .throw-val.hand-left {
            transform: translateY(-15px);
            border-top: 3px solid #555;
        }

        .throw-val.active {
            color: #fff;
            background: #007bff;
            border-color: #0056b3;
            z-index: 10;
            box-shadow: 0 0 15px #007bff;
        }

        .throw-val.hand-right.active { transform: translateY(15px) scale(1.1); }
        .throw-val.hand-left.active { transform: translateY(-15px) scale(1.1); }

        .controls { gap: 15px; display: flex; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .control-group { background: #444; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        
        button, input { padding: 8px 12px; font-size: 0.9rem; border: none; border-radius: 4px; }
        button { background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
        button.toggle-on { background: #2ecc71; }
        
        input[type="text"] { width: 80px; text-align: center; }
        label { font-size: 0.8rem; user-select: none; color: #ccc; }
        input[type="range"] { vertical-align: middle; }
    </style>
</head>
<body>

    <h2>JS Siteswap Simulator</h2>
    <canvas id="juggleCanvas" width="800" height="850"></canvas>

    <div id="patternDisplay"></div>

    <div class="controls">
        <div class="control-group">
            <input type="text" id="patternInput" value="5,3,1" placeholder="e.g. 5,3,1">
            <button onclick="updatePattern()">Set Siteswap</button>
        </div>
        
        <div class="control-group">
            <button onclick="api.run(sim)">Run</button>
            <button onclick="api.pause(sim)">Pause</button>
        </div>

        <div class="control-group">
            <label>Speed</label>
            <input type="range" min="0.1" max="2.0" step="0.1" value="1.0" 
                   oninput="api.set_speed(sim, parseFloat(this.value))">
        </div>

        <div class="control-group">
            <label>Gravity</label>
            <input type="range" min="500" max="4000" step="100" value="2000" 
                   oninput="api.set_gravity(sim, parseFloat(this.value))">
        </div>

        <div class="control-group">
             <button id="btnTime" onclick="toggleTime()">Show Time: OFF</button>
             <button id="btnHands" onclick="toggleHands()">Split Hands: OFF</button>
        </div>
    </div>

<script>

class JugglingSimulation {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.width = canvas.width;
        this.height = canvas.height;

        // Configuration
        this.gravity = 2000;
        this.beatTime = 0.45; 
        this.dwellRatio = 0.5; 
        this.speedScale = 1.0;
        
        // Visual Config
        this.ballRadius = 22; 
        this.showTime = false;
        
        // State
        this.siteswap = [];   
        this.props = []; 
        this.activeBalls = []; 
        this.schedule = {}; 
        this.unusedProps = [];
        
        this.beatIndex = 0;
        this.timeAccumulator = 0;
        this.lastFrameTime = 0;
        this.isRunning = false;
        
        this.onBeatChange = null; 
        this.palette = ['#e74c3c', '#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c'];
        
        // Coordinates
        const yPos = this.height * 0.75;
        this.hands = {
            left:  { catch: {x: this.width * 0.25, y: yPos}, throw: {x: this.width * 0.40, y: yPos} },
            right: { catch: {x: this.width * 0.75, y: yPos}, throw: {x: this.width * 0.60, y: yPos} }
        };
    }

    setShowTime(bool) { this.showTime = bool; }
    setGravity(g) { this.gravity = g; }
    setSpeed(s) { this.speedScale = s; }
    setBeatCallback(cb) { this.onBeatChange = cb; }

    setPattern(pattern) {
        this.siteswap = pattern;
        this.reset();
        
        const avg = pattern.reduce((a, b) => a + b, 0) / pattern.length;
        const numBalls = Math.floor(avg);
        
        this.props = [];
        for(let i=0; i<numBalls; i++) {
            this.props.push({
                id: i,
                color: this.palette[i % this.palette.length]
            });
        }
        this.unusedProps = [...this.props];
        
        if(this.onBeatChange) this.onBeatChange(0, this.siteswap);
    }

    reset() {
        this.activeBalls = [];
        this.schedule = {};
        this.beatIndex = 0;
        this.timeAccumulator = 0;
    }

    start() {
        if (this.isRunning) return;
        this.isRunning = true;
        this.lastFrameTime = performance.now();
        this.loop();
    }

    stop() {
        this.isRunning = false;
        cancelAnimationFrame(this.animId);
    }

    triggerUIUpdate() {
        if(this.onBeatChange) this.onBeatChange(this.beatIndex, this.siteswap);
    }

    update(dt) {
        const simDt = dt * this.speedScale;
        this.timeAccumulator += simDt;
        
        while (this.timeAccumulator >= this.beatTime) {
            this.processBeat();
            this.timeAccumulator -= this.beatTime;
        }
    }

    processBeat() {
        const currentBeat = this.beatIndex;
        this.activeBalls = this.activeBalls.filter(b => b.endBeat > currentBeat);

        if (this.siteswap.length === 0) return;

        if(this.onBeatChange) this.onBeatChange(currentBeat, this.siteswap);

        const patternIdx = currentBeat % this.siteswap.length;
        const patternVal = this.siteswap[patternIdx];
        
        let propId = this.schedule[currentBeat];
        if (propId === undefined && this.unusedProps.length > 0) {
            propId = this.unusedProps.shift().id;
        }

        if (propId !== undefined && patternVal !== 0) {
            const landBeat = currentBeat + patternVal;
            this.schedule[landBeat] = propId;

            const isRightHand = (currentBeat % 2) === 0;
            const throwHand = isRightHand ? this.hands.right : this.hands.left;
            const landsInRight = (patternVal % 2 !== 0) ? !isRightHand : isRightHand;
            const catchHand = landsInRight ? this.hands.right : this.hands.left;

            this.activeBalls.push({
                propId: propId,
                startBeat: currentBeat,
                endBeat: landBeat, 
                throwPos: throwHand.throw,
                catchPos: catchHand.catch,
                nextThrowPos: catchHand.throw
            });
        }

        this.beatIndex++;
        delete this.schedule[currentBeat]; 
    }

    getPropColor(id) {
        return (this.props.find(x => x.id === id) || {color:'#fff'}).color;
    }

    draw() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        
        // This represents the current continuous beat time (e.g., 5.45)
        const globalBeatTime = this.beatIndex + (this.timeAccumulator / this.beatTime) - 1; 

        // Draw Hands
        this.ctx.fillStyle = '#444';
        [this.hands.left, this.hands.right].forEach(h => {
            this.ctx.beginPath(); this.ctx.ellipse(h.catch.x, h.catch.y, 20, 5, 0, 0, Math.PI*2); this.ctx.fill();
            this.ctx.beginPath(); this.ctx.ellipse(h.throw.x, h.throw.y, 20, 5, 0, 0, Math.PI*2); this.ctx.fill();
        });

        this.activeBalls.forEach(ball => {
            const durationBeats = ball.endBeat - ball.startBeat;
            const tBeats = globalBeatTime - ball.startBeat; 
            
            if (tBeats < 0) return; 
            
            const flightDuration = Math.max(0.1, durationBeats - this.dwellRatio);
            let pos = {x:0, y:0};
            let isFlying = false;

            if (tBeats <= flightDuration) {
                // Flight
                isFlying = true;
                const t = tBeats / flightDuration;
                pos.x = ball.throwPos.x + (ball.catchPos.x - ball.throwPos.x) * t;
                const T_flight_sec = flightDuration * this.beatTime;
                const t_sec = t * T_flight_sec;
                const vy = 0.5 * this.gravity * T_flight_sec;
                const dy = (vy * t_sec) - (0.5 * this.gravity * t_sec * t_sec);
                pos.y = ball.throwPos.y - dy;
            } else {
                // Scoop
                const dwellTime = tBeats - flightDuration;
                const dwellTotal = durationBeats - flightDuration; 
                let t = dwellTime / dwellTotal;
                if(t > 1) t = 1; 
                const p0 = ball.catchPos;
                const p2 = ball.nextThrowPos;
                const cx = (p0.x + p2.x) / 2;
                const cy = p0.y + 120; 
                pos.x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*cx + t*t*p2.x;
                pos.y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*cy + t*t*p2.y;
            }

            this.ctx.fillStyle = this.getPropColor(ball.propId);
            this.ctx.beginPath();
            this.ctx.arc(pos.x, pos.y, this.ballRadius, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.strokeStyle = '#fff';
            this.ctx.lineWidth = 3;
            this.ctx.stroke();

            // Text Logic
            if (this.showTime && isFlying) {
                // FIXED LOGIC:
                // We use globalBeatTime to align changes exactly with the "tick"
                // floor(globalBeatTime) gives us the current beat index we are simulating
                const currentBeatInterval = Math.floor(globalBeatTime);
                const displayNum = ball.endBeat - currentBeatInterval;
                
                if (displayNum > 0) {
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(displayNum, pos.x, pos.y + 1); 
                }
            }
        });
    }

    loop() {
        if (!this.isRunning) return;
        const now = performance.now();
        const dt = (now - this.lastFrameTime) / 1000;
        this.lastFrameTime = now;
        this.update(dt);
        this.draw();
        this.animId = requestAnimationFrame(() => this.loop());
    }
}

// ---------------------------------------------------------
// API Glue
// ---------------------------------------------------------
const api = {
    init_simulation: (c) => new JugglingSimulation(c),
    set_siteswap: (s, p) => s.setPattern(p),
    run: (s) => s.start(),
    pause: (s) => s.stop(),
    set_speed: (s, v) => s.setSpeed(v),
    set_gravity: (s, v) => s.setGravity(v),
    set_show_time_on_balls: (s, b) => s.setShowTime(b),
    set_beat_callback: (s, cb) => s.setBeatCallback(cb),
    trigger_ui_update: (s) => s.triggerUIUpdate()
};

// ---------------------------------------------------------
// UI & Interaction
// ---------------------------------------------------------
const sim = api.init_simulation(document.getElementById('juggleCanvas'));
const displayDiv = document.getElementById('patternDisplay');

let isTimeOn = false;
let isHandsOn = false; 

api.set_beat_callback(sim, (absoluteBeatIdx, pattern) => {
    
    let displayPattern = pattern;
    // Visual doubling if needed
    if (isHandsOn && pattern.length % 2 !== 0) {
        displayPattern = [...pattern, ...pattern];
    }
    
    if (displayDiv.childElementCount !== displayPattern.length) {
        displayDiv.innerHTML = '';
        displayPattern.forEach((val, i) => {
            const span = document.createElement('span');
            span.className = 'throw-val';
            if (isHandsOn) {
                if (i % 2 === 0) span.classList.add('hand-right');
                else span.classList.add('hand-left');
            }
            span.innerText = val;
            displayDiv.appendChild(span);
        });
    }
    
    const activeIdx = absoluteBeatIdx % displayPattern.length;
    Array.from(displayDiv.children).forEach((child, i) => {
        if(i === activeIdx) child.classList.add('active');
        else child.classList.remove('active');
    });
});

api.set_siteswap(sim, [5,3,1]);
api.run(sim);

function updatePattern() {
    const val = document.getElementById('patternInput').value;
    try {
        const arr = val.split(',').map(n => parseInt(n.trim(), 10));
        if (arr.some(isNaN)) throw new Error("NaN");
        displayDiv.innerHTML = ''; 
        api.set_siteswap(sim, arr);
    } catch(e) { alert("Invalid Pattern"); }
}

function toggleTime() {
    isTimeOn = !isTimeOn;
    api.set_show_time_on_balls(sim, isTimeOn);
    const btn = document.getElementById('btnTime');
    btn.innerText = `Show Time: ${isTimeOn ? 'ON' : 'OFF'}`;
    btn.className = isTimeOn ? 'toggle-on' : '';
}

function toggleHands() {
    isHandsOn = !isHandsOn;
    displayDiv.innerHTML = ''; // Force rebuild
    api.trigger_ui_update(sim);
    const btn = document.getElementById('btnHands');
    btn.innerText = `Split Hands: ${isHandsOn ? 'ON' : 'OFF'}`;
    btn.className = isHandsOn ? 'toggle-on' : '';
}

</script>
</body>
</html>
